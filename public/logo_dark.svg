<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="100%" height="100%">
  <defs>
    <linearGradient id="vGradFinal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0529BE" />
      <stop offset="100%" stop-color="#071B5E" />
    </linearGradient>

    <marker id="inlineArrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8 z" fill="#3A86FF" />
    </marker>

    <filter id="systemGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#000A29" />

  <g transform="translate(400, 260)">
    
    <ellipse cx="0" cy="-20" rx="190" ry="50" fill="none" stroke="#3A86FF" stroke-width="2.5" opacity="0.2" transform="rotate(-15)" filter="url(#systemGlow)" />
    <circle cx="130" cy="-55" r="4" fill="#3A86FF" opacity="0.6" />

    <ellipse cx="0" cy="-25" rx="175" ry="40" fill="none" stroke="#3A86FF" stroke-width="2" opacity="0.15" transform="rotate(20)" filter="url(#systemGlow)" />
    <circle cx="-110" cy="-60" r="3" fill="#3A86FF" opacity="0.5" />

    <path d="M -120, -180 L -40, -180 L 0, 70 L -60, 70 Z" fill="url(#vGradFinal)" opacity="0.95" />
    <path d="M 120, -180 L 40, -180 L 0, 70 L 60, 70 Z" fill="#0529BE" />
    <path d="M 0, 70 L -40, -180 L 0, -80 Z" fill="#071B5E" opacity="0.6" />
    <path d="M 0, 70 L 40, -180 L 0, -80 Z" fill="#3A86FF" opacity="0.25" />

    <path d="M -30, 70 L -95, -180" fill="none" stroke="#3A86FF" stroke-width="4" stroke-dasharray="8,6" marker-end="url(#inlineArrow)" opacity="0.65" />
    
    <path d="M 30, 70 L 95, -180" fill="none" stroke="#3A86FF" stroke-width="4" stroke-dasharray="8,6" marker-end="url(#inlineArrow)" opacity="0.65" />

    <circle cx="0" cy="70" r="5" fill="#000A29" stroke="#3A86FF" stroke-width="2" />
  </g>

  <text x="400" y="570" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="600" 
        font-size="54" 
        fill="#FFFFFF" 
        text-anchor="middle" 
        letter-spacing="0.15em">VECTORIA</text>
        
  <text x="400" y="610" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="400" 
        font-size="15" 
        fill="#3A86FF" 
        text-anchor="middle" 
        letter-spacing="0.45em">PHYSICS SIMULATION</text>
</svg>
